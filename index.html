<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@2.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-scene fog="type: exponential; color: #050a1a; density: 0.015">
  
  <a-sky color="#1A1A2B"></a-sky>

  <a-plane 
    position="0 -20 0" 
    rotation="-90 0 0" 
    width="500" 
    height="500" 
    material="color: #050a1a; shader: flat; transparent: true; opacity: 0.6">
  </a-plane>

  <a-entity position="0 5 -10">
    <a-sphere radius="0.05" color="#00ffff" material="shader: flat"
              animation="property: position; to: 2 6 -8; dur: 5000; dir: alternate; loop: true"></a-sphere>
  </a-entity>
  <a-entity position="-5 8 -15">
    <a-sphere radius="0.03" color="#ff00ff" material="shader: flat"
              animation="property: position; to: -4 9 -13; dur: 7000; dir: alternate; loop: true"></a-sphere>
  </a-entity>
  <a-entity position="6 3 -20">
    <a-sphere radius="0.04" color="#ffcc00" material="shader: flat"
              animation="property: position; to: 5 4 -22; dur: 6000; dir: alternate; loop: true"></a-sphere>
  </a-entity>
      
      <a-entity 
        id="music" 
        sound="src: url(HappyS.mp3); loop: true; volume: 0.8; positional: false">
      </a-entity>
        
      <a-entity 
        ply-model="src:bridge2.ply"
        position="5 -6 -2"
        rotation="-90 0 90"
        material="shader: flat; vertexColors: vertex">
      </a-entity>

      <a-entity 
        ply-model="src:bridge2.ply"
        position="5 -6 8"
        rotation="-90 0 90"
        material="shader: flat; vertexColors: vertex">
      </a-entity>

      <a-entity position="0 25 -70">
        <a-sphere 
          radius="4" 
          segments-radial="32" 
          segments-height="32" 
          material="shader: flat; color: #ffffff; fog: false"
          animation="property: rotation; to: 0 360 0; dur: 10000; easing: linear; loop: true">
          <a-sphere 
            radius="4.3" 
            material="shader: flat; color: #ffffff; opacity: 0.3; transparent: true"
            animation="property: scale; from: 1 1 1; to: 1.1 1.1 1.1; dur: 2000; dir: alternate; loop: true">
          </a-sphere>
          <a-light type="point" intensity="2.5" distance="60" color="#ffffff"></a-light>
        </a-sphere>
      </a-entity>
      
    </a-scene>

    <script>
      document.body.addEventListener('click', function () {
        // 1. Lock the mouse
        var scene = document.querySelector('a-scene');
        if (scene.canvas) {
           scene.canvas.requestPointerLock();
        }

        // 2. Play the Global Sound
        var audioEntity = document.querySelector('#music');
        if (audioEntity && audioEntity.components.sound) {
           audioEntity.components.sound.playSound();
        }
      });
    </script>
  </body>
</html>
