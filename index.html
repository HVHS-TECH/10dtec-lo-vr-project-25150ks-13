<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@2.1.1/dist/aframe-extras.min.js"></script>
</head>

<body>
  <a-scene stats fog="type: exponential; color: #050a1a; density: 0.015">
    <a-assets>
      <a-mixin id="petal" 
               geometry="primitive: plane; width: 0.15; height: 0.2" 
               material="shader: flat; side: double; transparent: true; opacity: 0.8;">
      </a-mixin>
      <a-mixin id="stair-step" 
               geometry="primitive: box; width: 8; height: 0.25; depth: 1.5" 
               material="color: #d32f2f; emissive: #4e0000; emissiveIntensity: 0.3"></a-mixin>
    </a-assets>

    <a-sky color="#1A1A2B"></a-sky>

    <a-entity id="rig" position="0 0 0" player-gravity>
      <a-entity id="camera" camera="fov: 80" 
                look-controls="pointerLockEnabled: true" 
                wasd-controls="acceleration: 30"
                position="0 1.6 0">
      </a-entity>
    </a-entity>

    <a-entity id="music" sound="src: url(HappyS.mp3); loop: true; volume: 0.8; positional: false"></a-entity>

    <a-entity class="floor" ply-model="src:bridge2.ply" position="5 -6 -2" rotation="-90 0 90"></a-entity>
    <a-entity class="floor" ply-model="src:bridge2.ply" position="5 -6 -12" rotation="-90 0 90"></a-entity>
    
    <a-entity position="0 -0.2 -18">
      <a-entity class="floor" mixin="stair-step" position="0 -0.1 0"></a-entity>
      <a-entity class="floor" mixin="stair-step" position="0 -0.3 1.2"></a-entity>
      <a-entity class="floor" mixin="stair-step" position="0 -0.5 2.4"></a-entity>
      <a-entity class="floor" mixin="stair-step" position="0 -0.7 3.6"></a-entity>
      <a-entity class="floor" mixin="stair-step" position="0 -0.9 4.8"></a-entity>
    </a-entity>

    <a-entity class="floor" ply-model="src:bridge2.ply" position="5 -7.2 -28" rotation="-90 0 90"></a-entity>

    <a-entity position="7 -1.2 -35" rotation="0 45 0">
      <a-box position="0 0.5 0" width="3" height="1" depth="1.5" color="#b01a1a"></a-box>
      <a-box position="0 2.5 0" width="3.2" height="0.1" depth="1.7" color="#d32f2f"></a-box>
    </a-entity>

    <a-entity position="0 25 -100">
      <a-sphere radius="4" material="shader: flat; color: #ffffff; fog: false"></a-sphere>
    </a-entity>
  </a-scene>

  <script>
    // FIX: Better Mouse Lock (Lets ESC work properly)
    document.addEventListener('click', function () {
      document.querySelector('a-scene').canvas.requestPointerLock();
      const audio = document.querySelector('#music');
      if (audio.components.sound) audio.components.sound.playSound();
    }, { once: true });

    // SIMPLE GRAVITY COMPONENT
    AFRAME.registerComponent('player-gravity', {
      tick: function () {
        let pos = this.el.getAttribute('position');
        let z = pos.z;
        let targetY = 0;

        // Logic to set height based on Z position (where you are on the bridge)
        if (z < -16 && z > -25) {
            // This is the stair area - move the floor down gradually
            targetY = (z + 16) * 0.2; 
        } else if (z <= -25) {
            // You are on the lower bridge
            targetY = -1.2; 
        } else {
            // You are on the starting bridge
            targetY = 0;
        }

        // Smoothly move the player to the target height
        pos.y = targetY;
        this.el.setAttribute('position', pos);
      }
    });

    // Petal Component
    AFRAME.registerComponent('petal-particle', {
      init: function () {
        const colors = ['#ffb3b3', '#ffcccc', '#ffd1dc'];
        this.el.setAttribute('material', 'color', colors[Math.floor(Math.random() * 3)]);
        this.reset(true);
      },
      reset: function (start) {
        this.el.setAttribute('position', { x: (Math.random()-0.5)*40, y: start?Math.random()*25:25, z: (Math.random()*-80)-5 });
      },
      tick: function (t, dt) {
        let p = this.el.getAttribute('position');
        p.y -= 0.003 * dt;
        this.el.setAttribute('position', p);
        if (p.y < -5) this.reset(false);
      }
    });

    // Spawn 60 Petals
    document.querySelector('a-scene').addEventListener('loaded', () => {
      const s = document.querySelector('a-scene');
      for (let i=0; i<60; i++) {
        let p = document.createElement('a-entity');
        p.setAttribute('mixin', 'petal');
        p.setAttribute('petal-particle', '');
        s.appendChild(p);
      }
    });
  </script>
</body>
</html>
