<script>
  const scene = document.querySelector('a-scene');
  const camera = document.querySelector('#camera');

  // Unified Click Handler
  document.addEventListener('click', function () {
    const audio = document.querySelector('#music');

    if (document.pointerLockElement !== scene.canvas) {
      scene.canvas.requestPointerLock();
    }

    if (audio && audio.components.sound) {
      audio.components.sound.playSound();
    }
  });

  // Sprint Logic
  window.addEventListener('keydown', (e) => {
    if (e.shiftKey) camera.setAttribute('wasd-controls', 'acceleration', 80);
  });
  window.addEventListener('keyup', (e) => {
    if (e.key === 'Shift') camera.setAttribute('wasd-controls', 'acceleration', 20);
  });

  // Petal Component
  AFRAME.registerComponent('petal-particle', {
    init: function () {
      const colors = ['#ffb3b3', '#ffcccc', '#ffd1dc'];
      this.el.setAttribute('material', 'color', colors[Math.floor(Math.random() * 3)]);
      this.reset(true);
    },
    reset: function (start) {
      this.el.setAttribute('position', { 
        x: (Math.random() - 0.5) * 40, 
        y: start ? Math.random() * 25 : 25, 
        z: (Math.random() * -60) - 5 
      });
    },
    tick: function (t, dt) {
      let p = this.el.getAttribute('position');
      p.y -= 0.003 * dt;
      p.x += Math.sin(t / 1000 + p.y) * 0.01;
      this.el.setAttribute('position', p);
      if (p.y < -5) this.reset(false);
    }
  });

  // NEW: LANTERN GENERATOR SCRIPT
  scene.addEventListener('loaded', () => {
    // Hang crossing wires every 6 units down the main path
    for (let z = -2; z > -65; z -= 6) {
      // Wire
      let wire = document.createElement('a-box');
      wire.setAttribute('position', {x: 0, y: 5.5, z: z});
      wire.setAttribute('width', 10);
      wire.setAttribute('height', 0.02);
      wire.setAttribute('depth', 0.02);
      wire.setAttribute('color', '#222');
      scene.appendChild(wire);

      // Hang lanterns along the wire
      for (let x = -4; x <= 4; x += 2) {
        let lantern = document.createElement('a-entity');
        lantern.setAttribute('mixin', 'lantern-body');
        lantern.setAttribute('position', {x: x, y: 5.2, z: z});
        
        // Add point light every few lanterns for performance
        if (x === 0) {
          lantern.setAttribute('light', 'type: point; intensity: 0.6; distance: 8; color: #ffaa00');
        }
        scene.appendChild(lantern);
      }
    }

    // Spawn 60 Petals
    for (let i = 0; i < 60; i++) {
      let p = document.createElement('a-entity');
      p.setAttribute('mixin', 'petal');
      p.setAttribute('petal-particle', '');
      scene.appendChild(p);
    }
  });
</script>
