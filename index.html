<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@2.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sky color="lightblue"></a-sky>

      <a-entity position="0 0 -45" scale="2.5 2.5 2.5">
  
  <a-entity position="0 -1 0">
    <a-ocean width="50" depth="50" density="20" speed="2" color="#00ffff" opacity="0.3" position="0 0 0"></a-ocean>
    <a-sphere position="0 0 0" radius="15" scale="2 0.2 1" material="shader: flat; color: #00ffff; opacity: 0.1; transparent: true"
              animation="property: scale; to: 2.2 0.3 1.1; dur: 4000; dir: alternate; loop: true"></a-sphere>
  </a-entity>

  <a-box position="-4 4 0" width="0.9" height="8" depth="0.9" color="#ff1a1a"></a-box>
  <a-box position="4 4 0" width="0.9" height="8" depth="0.9" color="#ff1a1a"></a-box>
  
  <a-box position="0 6.3 0" width="10" height="0.4" depth="0.7" color="#ff3333"></a-box>
  <a-sphere position="0 6.3 0.5" radius="0.3" color="#ff9999" material="shader: flat"></a-sphere> <a-entity position="0 8.2 0">
    <a-box width="12" height="0.6" depth="1.1" color="#ff1a1a"></a-box>
    <a-box position="-5.8 0.2 0" rotation="0 0 20" width="2" height="0.6" depth="1.1" color="#ff1a1a"></a-box>
    <a-box position="5.8 0.2 0" rotation="0 0 -20" width="2" height="0.6" depth="1.1" color="#ff1a1a"></a-box>
    
    <a-box position="0 0.4 0" width="13" height="0.2" depth="1.3" color="#111111"></a-box>
    <a-box position="-6.3 0.6 0" rotation="0 0 20" width="2.5" height="0.2" depth="1.3" color="#111111"></a-box>
    <a-box position="6.3 0.6 0" rotation="0 0 -20" width="2.5" height="0.2" depth="1.3" color="#111111"></a-box>
  </a-entity>
  
  <a-entity position="0 7.3 0.6">
    <a-box width="1.2" height="1.8" depth="0.2" color="#664400"></a-box>
    <a-box width="1" height="1.6" depth="0.21" material="shader: flat; color: #ffcc00; emissive: #ffcc00; emissiveIntensity: 2"></a-box>
    <a-light type="point" color="#ffaa00" intensity="1.5" distance="8"></a-light>
  </a-entity>
  
  <a-entity position="0 9.2 0.7">
    <a-octahedron radius="0.6" material="shader: flat; color: #00ffff; emissive: #00ffff; emissiveIntensity: 5"
                  animation="property: rotation; to: 0 360 0; dur: 3000; easing: linear; loop: true"></a-octahedron>
    <a-light type="point" color="#00ffff" intensity="3" distance="12"></a-light>
  </a-entity>

</a-entity>pe="point" color="#ffaa00" intensity="1" distance="15" position="0 7 2"></a-light>
</a-entity>
      
      <a-entity 
        id="music" 
        sound="src: url(HappyS.mp3); loop: true; volume: 0.8; positional: false">
      </a-entity>
        
      <a-entity 
        ply-model="src:bridge2.ply"
        position="5 -6 -2"
        rotation="-90 0 90"
        material="shader: flat; vertexColors: vertex">
      </a-entity>

      <a-entity 
        ply-model="src:bridge2.ply"
        position="5 -6 8"
        rotation="-90 0 90"
        material="shader: flat; vertexColors: vertex">
      </a-entity>

      <a-entity position="0 25 -70">
        <a-sphere 
          radius="4" 
          segments-radial="32" 
          segments-height="32" 
          material="shader: flat; color: #ffffff; fog: false"
          animation="property: rotation; to: 0 360 0; dur: 10000; easing: linear; loop: true">
          <a-sphere 
            radius="4.3" 
            material="shader: flat; color: #ffffff; opacity: 0.3; transparent: true"
            animation="property: scale; from: 1 1 1; to: 1.1 1.1 1.1; dur: 2000; dir: alternate; loop: true">
          </a-sphere>
          <a-light type="point" intensity="2.5" distance="60" color="#ffffff"></a-light>
        </a-sphere>
      </a-entity>
    </a-scene>

    <script>
      document.body.addEventListener('click', function () {
        // 1. Lock the mouse
        var scene = document.querySelector('a-scene');
        if (scene.canvas) {
           scene.canvas.requestPointerLock();
        }

        // 2. Play the Global Sound
        var audioEntity = document.querySelector('#music');
        if (audioEntity && audioEntity.components.sound) {
           audioEntity.components.sound.playSound();
        }
      });
    </script>
  </body>
</html>
